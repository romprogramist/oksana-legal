name: Deploy to production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/spisanie/nextjs
            git fetch origin master
            git reset --hard origin/master
            npm ci
            npx prisma migrate deploy
            npx prisma db seed
            npm run build
            pm2 restart oksana-legal --update-env
            pm2 save
